name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Environment Tag and Lowercase Repo Name
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
            echo "Setting tag to latest for production..."
          else
            echo "DOCKER_TAG=dev" >> $GITHUB_ENV
            echo "Setting tag to dev for testing..."
          fi
          
          # Converts "Azly-blt/OsuBoard" to "azly-blt/osuboard"
          echo "LOWERC_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOWERC_REPO }}:${{ env.DOCKER_TAG }}
          platforms: linux/arm64