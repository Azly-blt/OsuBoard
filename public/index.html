<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsuBoard - Home</title>
    <link rel="stylesheet" href="styles.css">
    <script src="ui.js" defer></script>
    <script src="api.js" defer></script>
</head>
<body>

    <button id="nav-toggle" class="nav-toggle-btn">&#10005;</button>

    <nav id="main-nav" class="sidebar">
        <div class="logo">
            <h2>Osu<span>Board</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="profile.html">My Profile</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="search-wrapper">
            <h1>Welcome to OsuBoard</h1>
            <p>Search for a player to view their recent scores and live stats.</p>
            
            <form id="player-search-form" class="search-bar">
                <input type="text" id="player-search-input" placeholder="Search an osu! player..." required autocomplete="off">
                <button type="submit" class="search-btn" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </form> <div id="profile-result" class="profile-card hidden"></div>
            
        </div>
    </main>

</body>
</html>
